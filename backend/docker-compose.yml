services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neuroscholar
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neuroscholar"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: golang:1.22-alpine
    working_dir: /app
    command: go run ./cmd/migrate
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: neuroscholar
      DB_SSLMODE: disable
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  db_data:
